---
apiVersion: v1
kind: Namespace
metadata:
  name: calibre-web

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-web-config
  namespace: calibre-web
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn
  volumeName: pvc-80ca9a12-35b6-4a7e-8253-f4eaf32f2dbf
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-library
  namespace: calibre-web
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web
  namespace: calibre-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calibre-web
  template:
    metadata:
      labels:
        app: calibre-web
    spec:
      initContainers:
      - name: calibre-installer
        image: debian:bookworm-slim
        command: ["/bin/sh", "-c"]
        args:
        - |
          apt-get update && apt-get install -y wget xz-utils python3 libegl1 libopengl0 libxcb-cursor0 libfreetype6 libfontconfig1 libxrender1 libxext6 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 &&
          ln -sf /usr/bin/python3 /usr/bin/python &&
          wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sh /dev/stdin install_dir=/calibre-bin
        volumeMounts:
        - name: calibre-bin
          mountPath: /calibre-bin
      containers:
      - name: calibre-web
        image: lscr.io/linuxserver/calibre-web:latest
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Europe/Stockholm"
        - name: CACHE_DIR
          value: "/config/cache"
        ports:
        - containerPort: 8083
          name: http
        volumeMounts:
        - name: config
          mountPath: /config
        - name: library
          mountPath: /books
        - name: calibre-bin
          mountPath: /calibre-bin
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: calibre-web-config
      - name: library
        persistentVolumeClaim:
          claimName: calibre-library
      - name: calibre-bin
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: calibre-web
  namespace: calibre-web
spec:
  type: NodePort
  selector:
    app: calibre-web
  ports:
  - port: 8083
    targetPort: 8083
    name: http
