---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argo-rollouts-tls
  namespace: argo-rollouts
spec:
  secretName: argo-rollouts-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - rollouts.enbom.eu

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argo-rollouts
  namespace: argo-rollouts
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`rollouts.enbom.eu`)
    kind: Rule
    services:
    - name: argo-rollouts-dashboard
      port: 3100
  tls:
    secretName: argo-rollouts-tls
