---
apiVersion: v1
kind: Namespace
metadata:
  name: home-assistant

---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  type: ExternalName
  externalName: home-assistant.lan
  ports:
  - port: 8123

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-assistant-tls
  namespace: home-assistant
spec:
  secretName: home-assistant-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
  - ha.enbom.eu

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: home-assistant
  namespace: home-assistant
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`ha.enbom.eu`)
    kind: Rule
    services:
    - name: home-assistant
      port: 8123
  tls:
    secretName: home-assistant-tls
