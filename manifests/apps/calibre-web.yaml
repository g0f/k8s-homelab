apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calibre-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/g0f/k8s-homelab
    targetRevision: HEAD
    path: manifests/calibre-web
  destination:
    server: https://kubernetes.default.svc
    namespace: calibre-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
